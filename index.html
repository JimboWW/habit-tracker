<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Weekly Tracker V0.1</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Weekly Tracker</h1>

<div id="tracker">

    <div class="row header">
        <div class="cell task">Task</div>
        <div class="cell">Mon</div>
        <div class="cell">Tue</div>
        <div class="cell">Wed</div>
        <div class="cell">Thu</div>
        <div class="cell">Fri</div>
        <div class="cell">Sat</div>
        <div class="cell">Sun</div>
    </div>

    <div class="row">
        <div class="cell task">Walk</div>
        <div class="cell button"></div>
        <div class="cell button"></div>
        <div class="cell button"></div>
        <div class="cell button"></div>
        <div class="cell button"></div>
        <div class="cell button"></div>
        <div class="cell button"></div>
    </div>

    <div class="row">
        <div class="cell task">Stretch</div>
        <div class="cell button"></div>
        <div class="cell button"></div>
        <div class="cell button"></div>
        <div class="cell button"></div>
        <div class="cell button"></div>
        <div class="cell button"></div>
        <div class="cell button"></div>
    </div>

    <div class="row">
        <div class="cell task">Meditate</div>
        <div class="cell button"></div>
        <div class="cell button"></div>
        <div class="cell button"></div>
        <div class="cell button"></div>
        <div class="cell button"></div>
        <div class="cell button"></div>
        <div class="cell button"></div>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
