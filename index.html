<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Weekly Tracker V0.3.7</title>

<!-- as of 4/8/26, this tracker includes the following features:
✔ Dynamic task creation
✔ Editable task names
✔ Daily toggle tracking
✔ Row scoring
✔ Grand total calculation
✔ Reset week button
✔ Current date display
✔ Highlighted current day
✔ Persistent storage
✔ “Other” counter for miscellaneous activity
✔ Manual JSON editing capability if needed
-->

<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Weekly Tracker</h1>

<div id="currentDate"></div>

<div id="reset-column"><button id="reset-week">⟲</button></div>

<div id="tracker">

    <div class="row header">
        <div class="cell task">Task</div>
        <div class="cell">Mon</div>
        <div class="cell">Tue</div>
        <div class="cell">Wed</div>
        <div class="cell">Thu</div>
        <div class="cell">Fri</div>
        <div class="cell">Sat</div>
        <div class="cell">Sun</div>
        <div class="cell">Score</div>
    </div>

    <button id="addRow">+ Add Task</button> 

    <div class="row total-row">
    <div class="cell task">TOTAL</div>
    <div class="cell" colspan="7"></div>     
    <div class="cell" id="grandTotal">0</div>

</div>


<div id="otherContainer">
    <div class="cell task">Other</div>
    <button id="otherMinus">-</button>
    <div id="otherCount">0</div>
    <button id="otherPlus">+</button>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
