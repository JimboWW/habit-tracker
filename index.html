<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Weekly Tracker V0.3.6</title>

<!-- 
✔ Dynamic task rows
✔ Editable task names
✔ Clickable habit tracking grid
✔ Automatic row scoring
✔ Grand total scoring
✔ Persistence with localStorage
✔ Data stored as JSON
✔ Display current date
✔ Update date at midnight
✔ Reset button to clear data
-->

<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Weekly Tracker</h1>

<div id="currentDate"></div>

<div id="reset-column"><button id="reset-week">⟲</button></div>

<div id="tracker">

    <div class="row header">
        <div class="cell task">Task</div>
        <div class="cell">Mon</div>
        <div class="cell">Tue</div>
        <div class="cell">Wed</div>
        <div class="cell">Thu</div>
        <div class="cell">Fri</div>
        <div class="cell">Sat</div>
        <div class="cell">Sun</div>
        <div class="cell">Score</div>
    </div>

    <button id="addRow">+ Add Task</button>

    <div class="row total-row">
    <div class="cell task">TOTAL</div>
    <div class="cell" colspan="7"></div>
    <div class="cell" id="grandTotal">0</div>

</div>


</div>

<script src="script.js"></script>

</body>
</html>
